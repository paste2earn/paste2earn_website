# Render Blueprint - Paste2Earn Static Site (Frontend)
# See: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: paste2earn
    runtime: static
    # Root directory for the frontend
    rootDir: frontend
    # Must install devDependencies (vite, plugin-react) for build
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: dist
    # Rewrite all routes to index.html for SPA
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
